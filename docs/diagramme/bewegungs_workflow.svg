<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 920" width="680" height="920" font-family="Arial, sans-serif">
  <title>Aktivitätsdiagramm: Bewegungs-Workflow</title>
  <desc>Aktivitätsdiagramm für den Bewegungs-Workflow: Intervall → Reminder → bestätigt/ignoriert → Tagesfortschritt</desc>

  <!-- Background -->
  <rect width="680" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Aktivitätsdiagramm: Bewegungs-Workflow</text>

  <!-- Defs: arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaaaaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== START ===== -->
  <circle cx="340" cy="68" r="16" fill="#555555"/>
  <text x="370" y="72" font-size="11" fill="#666666" dominant-baseline="central">Start</text>

  <!-- Start -> Intervall -->
  <line x1="340" y1="84" x2="340" y2="116" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== INTERVALL KONFIGURIEREN ===== -->
  <rect x="200" y="116" width="280" height="50" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="1"/>
  <text x="340" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d4e00" dominant-baseline="central">Intervall konfigurieren</text>
  <text x="340" y="154" text-anchor="middle" font-size="11" fill="#a06800" dominant-baseline="central">Dauer, Häufigkeit, Zeitfenster</text>

  <!-- Konfigurieren -> Timer -->
  <line x1="340" y1="166" x2="340" y2="206" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== INTERVALL-TIMER ===== -->
  <rect x="200" y="206" width="280" height="50" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="340" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d6a2d" dominant-baseline="central">Intervall-Timer läuft</text>
  <text x="340" y="244" text-anchor="middle" font-size="11" fill="#4a7c4a" dominant-baseline="central">Konfiguriertes Bewegungsintervall</text>

  <!-- Timer -> Reminder -->
  <line x1="340" y1="256" x2="340" y2="296" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="355" y="279" font-size="10" fill="#666666" dominant-baseline="central">Intervall abgelaufen</text>

  <!-- ===== REMINDER ERSTELLEN ===== -->
  <rect x="200" y="296" width="280" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="340" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b2d82" dominant-baseline="central">Reminder erstellen</text>
  <text x="340" y="334" text-anchor="middle" font-size="11" fill="#7d4da8" dominant-baseline="central">Push-Benachrichtigung senden</text>

  <!-- Reminder -> Raute -->
  <line x1="340" y1="346" x2="340" y2="388" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== RAUTE: NUTZER REAGIERT? ===== -->
  <polygon points="340,388 405,433 340,478 275,433" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="340" y="427" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d5a00" dominant-baseline="central">Nutzer</text>
  <text x="340" y="443" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d5a00" dominant-baseline="central">reagiert?</text>

  <!-- Raute links -> Ignoriert -->
  <line x1="275" y1="433" x2="180" y2="433" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="225" y="421" text-anchor="middle" font-size="10" fill="#666666">ignoriert</text>

  <!-- ===== IGNORIERT ===== -->
  <rect x="60" y="408" width="120" height="50" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="120" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a1a17" dominant-baseline="central">Ignoriert</text>
  <text x="120" y="446" text-anchor="middle" font-size="11" fill="#a33330" dominant-baseline="central">Kein Eintrag</text>

  <!-- Ignoriert zurück zu Timer -->
  <path d="M60 433 L30 433 L30 231 L200 231" fill="none" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr2)"/>
  <text x="18" y="333" font-size="10" fill="#999999" transform="rotate(-90,18,333)">Weiter</text>

  <!-- Raute rechts -> Bestätigt -->
  <line x1="405" y1="433" x2="500" y2="433" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="455" y="421" text-anchor="middle" font-size="10" fill="#666666">bestätigt</text>

  <!-- ===== BESTÄTIGT ===== -->
  <rect x="500" y="408" width="120" height="50" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="560" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d6a2d" dominant-baseline="central">Bestätigt</text>
  <text x="560" y="446" text-anchor="middle" font-size="11" fill="#4a7c4a" dominant-baseline="central">Aktivität loggen</text>

  <!-- Bestätigt -> Aktivität erfassen -->
  <path d="M560 458 L560 543 L480 543" fill="none" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== AKTIVITÄT ERFASSEN ===== -->
  <rect x="200" y="518" width="280" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="340" y="538" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b2d82" dominant-baseline="central">Aktivität erfassen</text>
  <text x="340" y="556" text-anchor="middle" font-size="11" fill="#7d4da8" dominant-baseline="central">Dauer, Typ, Zeitstempel speichern</text>

  <!-- Ignoriert gestrichelt -> Aktivität erfassen -->
  <path d="M60 458 L60 543 L200 543" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr2)"/>

  <!-- Aktivität -> Tagesfortschritt -->
  <line x1="340" y1="568" x2="340" y2="608" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== TAGESFORTSCHRITT AKTUALISIEREN ===== -->
  <rect x="180" y="608" width="320" height="50" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="340" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d6a2d" dominant-baseline="central">Tagesfortschritt aktualisieren</text>
  <text x="340" y="646" text-anchor="middle" font-size="11" fill="#4a7c4a" dominant-baseline="central">Fortschrittsbalken &amp; Zähler erhöhen</text>

  <!-- Tagesfortschritt -> Raute Tagesziel -->
  <line x1="340" y1="658" x2="340" y2="703" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== RAUTE: TAGESZIEL ERREICHT? ===== -->
  <polygon points="340,703 410,748 340,793 270,748" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="340" y="742" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d5a00" dominant-baseline="central">Tagesziel</text>
  <text x="340" y="758" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d5a00" dominant-baseline="central">erreicht?</text>

  <!-- Tagesziel nein -> Zurück -->
  <line x1="270" y1="748" x2="150" y2="748" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr2)"/>
  <text x="207" y="736" text-anchor="middle" font-size="10" fill="#999999">nein</text>
  <path d="M150 748 L150 231 L200 231" fill="none" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr2)"/>

  <!-- Tagesziel ja -> Ziel erreicht -->
  <line x1="410" y1="748" x2="500" y2="748" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="457" y="736" text-anchor="middle" font-size="10" fill="#666666">ja</text>

  <!-- ===== ZIEL ERREICHT ===== -->
  <rect x="500" y="723" width="130" height="50" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="565" y="743" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d6a2d" dominant-baseline="central">Ziel erreicht!</text>
  <text x="565" y="761" text-anchor="middle" font-size="11" fill="#4a7c4a" dominant-baseline="central">Erfolg anzeigen</text>

  <!-- Ziel -> Ende -->
  <path d="M565 773 L565 843 L356 843" fill="none" stroke="#555555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== ENDE ===== -->
  <circle cx="340" cy="843" r="20" fill="none" stroke="#555555" stroke-width="2.5"/>
  <circle cx="340" cy="843" r="13" fill="#555555"/>
  <text x="370" y="847" font-size="11" fill="#666666" dominant-baseline="central">Ende</text>

  <!-- Legende -->
  <rect x="30" y="848" width="240" height="55" rx="6" fill="#f9f9f9" stroke="#cccccc" stroke-width="0.5"/>
  <text x="150" y="862" text-anchor="middle" font-size="10" font-weight="bold" fill="#555555">Legende</text>
  <rect x="40" y="870" width="14" height="10" rx="2" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="60" y="879" font-size="9" fill="#555555">Konfiguration</text>
  <rect x="120" y="870" width="14" height="10" rx="2" fill="#d5e8d4" stroke="#82b366"/>
  <text x="140" y="879" font-size="9" fill="#555555">Aktion</text>
  <rect x="175" y="870" width="14" height="10" rx="2" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="195" y="879" font-size="9" fill="#555555">Verarbeitung</text>
  <text x="40" y="895" font-size="9" fill="#999999">--- Optionaler Pfad</text>
  <text x="155" y="895" font-size="9" fill="#555555">—— Hauptpfad</text>
</svg>
